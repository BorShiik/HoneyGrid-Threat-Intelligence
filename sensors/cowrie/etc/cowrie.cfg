# ============================================================================
# HoneyGrid — konfiguracja sensora Cowrie (SSH/Telnet honeypot)
#
# Plik nadpisuje domyślny cowrie.cfg z obrazu `cowrie/cowrie`. Cała filozofia
# tej konfiguracji to FINGERPRINT-EVASION: chcemy, żeby skanery (Shodan,
# Censys, masscan + skrypty rozpoznające honeypoty, np. po domyślnym bannerze
# Cowrie "SSH-2.0-OpenSSH_6.0p1 Debian") NIE rozpoznały, że to przynęta.
# Im dłużej atakujący wierzy, że to prawdziwy serwer produkcyjny, tym więcej
# faz łańcucha (post-exploitation, lateral movement, pobieranie malware)
# zaobserwujemy i wyślemy do Event Hubs.
#
# WAŻNE: ten plik jest montowany TYLKO do odczytu. Stan zmienny (logi, TTY,
# pobrane pliki) trafia do katalogów var/ na wolumenie Azure Files — patrz
# Dockerfile i README.md.
# ============================================================================

[honeypot]
# --- Tożsamość fałszywego hosta -------------------------------------------
# Hostname widoczny w prompcie powłoki po zalogowaniu. Wybieramy nazwę, która
# wygląda jak realny serwer produkcyjny w firmie, a nie jak "svr04" czy
# domyślne "svr04" Cowrie (które jest sygnaturą honeypota). "srv-prod-01"
# sugeruje atakującemu, że trafił na coś wartościowego.
hostname = srv-prod-01

# Katalogi stanu — wskazują na wolumen Azure Files (persystencja między
# restartami kontenera). log_path zawiera cowrie.json, który tail-uje
# sidecar CowrieShipper.
log_path = var/log/cowrie
download_path = var/lib/cowrie/downloads
# state_path wskazuje na WSPÓŁDZIELONY wolumen (cowrie-logs), bo nagrania TTY trafiają
# do <state_path>/tty — sidecar CowrieShipper musi je widzieć, by wgrać do Blob
# (Session Replay). Wolumen jest montowany w obu kontenerach: u Cowrie pod
# /cowrie/cowrie-git/var/log/cowrie, u shippera pod /var/log/cowrie.
state_path = var/log/cowrie
etc_path = etc
contents_path = honeyfs
txtcmds_path = txtcmds

# Fałszywy system plików (pickle) i zawartość komend — z obrazu bazowego.
# Dzięki nim `cat /etc/passwd`, `uname -a` itp. zwracają wiarygodne dane.
filesystem = src/cowrie/data/fs.pickle

# Wyłączamy interaktywny prompt zmiany hasła i inne drobiazgi, które zdradzają
# emulację. data_path/share — domyślne z obrazu.
share_path = share/cowrie

# Strefa czasowa logów — UTC, żeby korelacja w Sentinelu była jednoznaczna.
timezone = UTC

# Sztuczne opóźnienie odpowiedzi powłoki (sekundy). Prawdziwy serwer nie
# odpowiada w 0 ms — minimalne opóźnienie utrudnia automatyczne wykrycie
# emulatora po nienaturalnie szybkich odpowiedziach.
# (Zostawiamy domyślne zachowanie Cowrie; brak jawnego override.)

# Reportowanie wersji jądra/architektury widoczne np. w `uname` pochodzi
# z honeyfs/txtcmds — spójne z bannerem OpenSSH 8.9 / Ubuntu 22.04.

[shell]
# Komunikat dnia (banner po zalogowaniu) — spójny z fałszywą tożsamością
# Ubuntu 22.04. Niespójny MOTD to klasyczna wpadka honeypota.
# (Treść MOTD bierzemy z honeyfs/etc/motd obrazu bazowego.)

# ============================================================================
# SSH — najważniejszy front anti-detection
# ============================================================================
[ssh]
enabled = true

# --- Spoofowany banner wersji SSH -----------------------------------------
# TO JEST KLUCZOWA LINIA fingerprint-evasion. Domyślny banner Cowrie
# ("SSH-2.0-OpenSSH_6.0p1 Debian-4+deb7u2") jest w bazach sygnatur jako
# honeypot. Podajemy banner aktualnego, łatanego OpenSSH z Ubuntu 22.04 LTS,
# żeby host wyglądał na normalnie utrzymywany serwer produkcyjny.
version = SSH-2.0-OpenSSH_8.9p1 Ubuntu-3ubuntu0.4

# Port wewnętrzny, na którym nasłuchuje Cowrie w kontenerze. Publiczny ruch
# z portu 22 jest mapowany na 2222 na poziomie ingress Container Apps
# (patrz app.bicep) — kontener NIE potrzebuje uprawnień roota do portu <1024.
listen_endpoints = tcp:2222:interface=0.0.0.0

# Algorytmy kluczy/szyfrów — zostawiamy domyślne nowoczesne zestawy Cowrie,
# które pokrywają się z OpenSSH 8.9 (gdyby klient negocjował egzotyczny zestaw
# niespójny z bannerem, mógłby wykryć podstawienie).

# ============================================================================
# Telnet — drugi front (urządzenia IoT, botnety Mirai-like)
# ============================================================================
[telnet]
# Włączamy Telnet: ogromna część ruchu botnetów IoT (Mirai i pochodne) idzie
# po Telnecie (port 23). Bez tego stracilibyśmy najliczniejszą klasę ataków.
enabled = true

# Port wewnętrzny 2223; publiczny 23 mapowany na 2223 w ingress Container Apps.
listen_endpoints = tcp:2223:interface=0.0.0.0

# ============================================================================
# Wyjście logów — to z tych danych żyje cały pipeline HoneyGrid
# ============================================================================

# --- JSON (główne źródło telemetrii) --------------------------------------
# Sidecar CowrieShipper (worker .NET) tail-uje plik var/log/cowrie/cowrie.json
# i wysyła każde zdarzenie do Event Hubs. JSON wybrany celowo: parsowanie bez
# regexów, jedno zdarzenie = jedna linia (JSON Lines).
[output_jsonlog]
enabled = true
logfile = var/log/cowrie/cowrie.json
epoch_timestamp = true

# --- Logowanie TTY (nagrania sesji do Session Replay) ---------------------
# Cowrie domyślnie zapisuje binarne dumpy TTY (format UML compatible) do
# var/lib/cowrie/tty/. To z nich budujemy purkadrowy replay sesji w xterm.js
# na dashboardzie. Katalog leży na wolumenie Azure Files (persystencja).
# Logowanie TTY jest wbudowane w rdzeń Cowrie i włączone domyślnie — tu tylko
# dokumentujemy, że KATALOG tty/ musi być na trwałym wolumenie (patrz Dockerfile).

# --- Tekstowy log audytowy (pomocniczo, do debugowania kontenera) ---------
# Zostawiamy domyślny output do stdout obrazu, żeby `az containerapp logs`
# pokazywał aktywność. Główną telemetrią pozostaje JSON powyżej.

# ============================================================================
# Backend powłoki — emulacja "shell" (nie proxy do prawdziwego hosta)
# ============================================================================
[backend_pool]
# Nie używamy puli prawdziwych backendów (to wymaga osobnej infrastruktury
# i jest ryzykowne — atakujący dostałby realny system). Zostajemy przy
# wbudowanej emulacji powłoki Cowrie ("shell").
enabled = false
